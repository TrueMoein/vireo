name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    name: swift build (debug)
    # Vireo needs the macOS 26 SDK (Liquid Glass APIs — `.glassEffect`,
    # MeshGradient driven animations, etc.). Pin to the Tahoe runner.
    # If GitHub hasn't added `macos-26` as a label yet, this job fails
    # with "No runner matching the specified labels" — fall back to
    # `macos-latest` + a setup-xcode step in that case.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        # The Tahoe runner ships multiple Xcode versions; switch to the
        # newest stable one explicitly so we never accidentally build
        # against an older SDK that doesn't expose Liquid Glass APIs.
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $LATEST_XCODE"
          sudo xcode-select -switch "$LATEST_XCODE"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: swift package resolve

      - name: Build
        run: swift build -c debug

      - name: Test
        run: swift test -c debug
